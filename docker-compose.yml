services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        user: laravel
        uid: 1000
    image: health-links-app
    container_name: health-links-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - health-links

  nginx:
    image: nginx:alpine
    container_name: health-links-nginx
    restart: unless-stopped
    ports:
      - "3355:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - health-links

  db:
    image: mysql:8.0
    container_name: health-links-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: health_links
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: laravel
      MYSQL_USER: laravel
    ports:
      - "3356:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - health-links

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: health-links-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
      UPLOAD_LIMIT: 256M
    ports:
      - "3357:80"
    depends_on:
      - db
    networks:
      - health-links

networks:
  health-links:
    driver: bridge

volumes:
  dbdata:
    driver: local
